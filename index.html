<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceRoom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & modern base ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-hover: #27272a;
            --border: #3f3f46;
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #6366f1;
            /* Indigo */
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.08) 0%, transparent 40%);
        }

        .hidden {
            display: none !important;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo svg {
            color: var(--primary);
        }

        #statusPill {
            font-size: 0.8rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #statusDot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }

        /* ── Main Layout Views ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── Pre-join screen ── */
        #preJoinScreen {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeUp 0.4s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #preJoinScreen h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        #preJoinScreen p {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 1rem;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* ── Buttons ── */
        button {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            margin-top: 8px;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
            background: var(--primary-hover);
        }

        .btn-action {
            background: var(--success);
            color: #000;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }

        .btn-action:disabled {
            opacity: 0.5;
            background: var(--surface-hover);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            border: 1px solid var(--border);
        }

        .btn-action:not(:disabled):active {
            transform: scale(0.98);
            filter: brightness(0.9);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:active {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary.muted {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border-color: rgba(245, 158, 11, 0.3);
        }

        /* ── Main App Screen (Two Panels) ── */
        #mainAppScreen {
            width: 100%;
            max-width: 1100px;
            height: 80vh;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            animation: fadeUp 0.4s ease-out;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ── Left side (Controls & Users) ── */
        .controls-area {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .participants-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
        }

        #userList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .participant-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            transition: background 0.2s;
        }

        .participant-item.me {
            background: rgba(99, 102, 241, 0.05);
            border-color: rgba(99, 102, 241, 0.2);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--surface-hover);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .avatar-me {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
        }

        .participant-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .me-tag {
            color: var(--primary);
            font-size: 0.75rem;
            margin-left: 4px;
            font-weight: 600;
        }

        /* ── Right side (Activity) ── */
        #activityLog {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #activityLog::-webkit-scrollbar,
        .participants-area::-webkit-scrollbar {
            width: 6px;
        }

        #activityLog::-webkit-scrollbar-thumb,
        .participants-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .log-empty {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .log-entry {
            font-size: 0.85rem;
            line-height: 1.5;
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid #555;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-info {
            border-color: var(--text-muted);
            color: var(--text);
        }

        .log-join {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .log-leave {
            border-color: var(--border);
            color: var(--text-muted);
        }

        .log-call {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.05);
        }

        .log-warning {
            border-color: var(--warning);
            color: var(--warning);
        }

        .log-error {
            border-color: var(--danger);
            color: var(--danger);
        }

        .log-success {
            border-color: var(--success);
            color: var(--success);
        }

        .log-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-right: 8px;
            padding-right: 8px;
            border-right: 1px solid var(--border);
            font-variant-numeric: tabular-nums;
        }

        /* Timer inside panel header */
        #callTimer {
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        @media (max-width: 800px) {
            #mainAppScreen {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                height: 100%;
            }

            main {
                padding: 12px;
            }

            #preJoinScreen {
                padding: 24px;
            }
        }
    </style>
</head>

<body>

    <!-- ── Header ── -->
    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
            </svg>
            VoiceRoom
        </div>
        <div id="statusPill">
            <span id="statusDot"></span>
            <span id="status">Idle</span>
        </div>
    </header>

    <main>
        <!-- ── 1. Setup / Join Screen ── -->
        <div id="preJoinScreen">
            <h2>Join a Channel</h2>
            <p>Hop into a room to start talking</p>

            <div class="input-group">
                <label for="username">Display Name</label>
                <input id="username" placeholder="Alex" autocomplete="off" maxlength="32" autofocus />
            </div>
            <div class="input-group">
                <label for="room">Room Code</label>
                <input id="room" placeholder="dev-team" autocomplete="off" maxlength="64" />
            </div>

            <button id="joinBtn" class="btn-primary">
                Enter Room
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>

        <!-- ── 2. Main App Screen ── -->
        <div id="mainAppScreen" class="hidden">

            <!-- Sidebar: Call Controls & Participants -->
            <div class="panel">
                <div class="panel-header">
                    <span>Room: <strong id="currentRoomText" style="color: white;">---</strong></span>
                </div>

                <div class="controls-area">
                    <button id="callBtn" class="btn-action">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                            </path>
                        </svg>
                        Call
                    </button>

                    <div style="display: flex; gap: 8px;">
                        <button id="muteBtn" class="btn-secondary hidden" style="flex: 1;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="22"></line>
                            </svg>
                            Mute
                        </button>

                        <button id="leaveBtn" class="btn-danger" style="flex: 1;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                                <line x1="12" y1="2" x2="12" y2="12"></line>
                            </svg>
                            Leave
                        </button>
                    </div>
                </div>

                <div class="panel-header" style="border-top: none;">
                    Participants
                </div>
                <div class="participants-area">
                    <ul id="userList">
                        <li class="empty-state">No one else here</li>
                    </ul>
                </div>
            </div>

            <!-- Active Log Area -->
            <div class="panel">
                <div class="panel-header">
                    <span>Activity Log</span>
                    <span id="callTimer" class="hidden">⏱ 00:00</span>
                </div>
                <div id="activityLog">
                    <div class="log-empty">Join a room to see activity.</div>
                </div>
            </div>

        </div>
    </main>

    <audio id="remoteAudio" autoplay style="display:none"></audio>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>

</html>
